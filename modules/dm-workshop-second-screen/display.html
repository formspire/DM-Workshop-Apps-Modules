<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DM Workshop Table View</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
      background: #000;
      color: #f4efe5;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    #stream {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #050506;
      transition: opacity 180ms ease;
    }

    #card {
      width: min(460px, calc(100vw - 48px));
      padding: 22px;
      border: 1px solid #6d5f7a;
      border-radius: 8px;
      background: #17121d;
      box-shadow: 0 18px 70px rgba(0, 0, 0, 0.72);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.2;
    }

    p {
      margin: 8px 0;
      line-height: 1.45;
      color: #d8cfe0;
    }

    button {
      margin-top: 14px;
      min-height: 38px;
      padding: 0 16px;
      border: 1px solid #f2a65a;
      border-radius: 6px;
      background: #241d2d;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    #status {
      font-weight: 700;
    }

    .connected #overlay {
      opacity: 0;
      pointer-events: none;
    }

    .is-idle #overlay {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <img id="stream" alt="DM Workshop player display">
  <main id="overlay">
    <section id="card" aria-live="polite">
      <h1>DM Workshop Table View</h1>
      <p id="status">Waiting for the GM screen stream.</p>
      <p>Keep the DM Workshop preview open in Foundry while this display is active.</p>
      <button id="fullscreen" type="button">Enter Fullscreen</button>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const channelName = params.get("channel");
    const stream = document.getElementById("stream");
    const status = document.getElementById("status");
    const fullscreen = document.getElementById("fullscreen");
    let lastFrameAt = 0;
    let channel = null;

    async function requestFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen({ navigationUI: "hide" });
        }
        fullscreen.hidden = true;
      } catch (_error) {
        fullscreen.hidden = false;
      }
    }

    fullscreen.addEventListener("click", requestFullscreen);
    document.addEventListener("keydown", event => {
      if (event.shiftKey && event.key === "Escape") window.close();
    });

    if (!channelName) {
      status.textContent = "No display channel was provided.";
    } else if (typeof BroadcastChannel !== "function") {
      status.textContent = "This browser cannot receive the player screen stream.";
    } else {
      channel = new BroadcastChannel(channelName);
      channel.addEventListener("message", event => {
        const message = event.data ?? {};
        if (message.type === "frame" && message.src) {
          stream.src = message.src;
          lastFrameAt = Date.now();
          document.body.classList.add("connected");
          document.body.classList.remove("is-idle");
        } else if (message.type === "closed") {
          status.textContent = "The GM preview was closed.";
          document.body.classList.remove("connected");
          document.body.classList.add("is-idle");
        }
      });
      status.textContent = "Waiting for the GM screen stream.";
    }

    window.setInterval(() => {
      if (!lastFrameAt || Date.now() - lastFrameAt < 3000) return;
      status.textContent = "The GM stream paused. Keep the preview open in Foundry.";
      document.body.classList.remove("connected");
      document.body.classList.add("is-idle");
    }, 1000);

    void requestFullscreen();
  </script>
</body>
</html>
